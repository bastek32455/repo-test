<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowy Przelew - Bank Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <a href="{{ url_for('index') }}" class="nav-back">
            <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Powrót do pulpitu
        </a>

        <h1>Nowy Przelew</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Prześlij bezpiecznie środki do dowolnego odbiorcy.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('transfer') }}" method="POST">
            <div class="form-group">
                <label for="recipient">Nazwa odbiorcy / Numer konta</label>
                <input type="text" id="recipient" name="recipient" placeholder="np. Adam Nowak / 12 ... 3456" required>
            </div>
            <div class="form-group">
                <label for="amount">Kwota (PLN)</label>
                <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
            </div>
            <div class="form-group">
                <label for="description">Tytuł przelewu</label>
                <input type="text" id="description" name="description" placeholder="np. Za obiad" required>
            </div>
            <button type="submit" class="submit-btn" style="margin-top: 20px;">Wykonaj Przelew</button>
        </form>
    </div>
</body>
</html>
